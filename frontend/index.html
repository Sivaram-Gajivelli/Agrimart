<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Agrimart - Direct from Farms</title>
    <style>
      /* Force body to stay at top */
      body { top: 0px !important; position: static !important; }
      html { height: 100% !important; margin-top: 0px !important; }
      
      /* Target all possible Google Translate banner frames/elements */
      .goog-te-banner-frame,
      .goog-te-banner,
      .skiptranslate.goog-te-banner-frame,
      iframe[class*="goog-te-banner-frame"],
      #goog-gt-tt,
      .goog-te-balloon-frame,
      .VIpgJd-Zvi9qb-OR9h33-mlUOnb,
      #\3a 1\.container,
      iframe.skiptranslate {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
        width: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // MutationObserver to catch and hide the banner if it's dynamically added
      const observer = new MutationObserver((mutations) => {
        const topBar = document.querySelector('.goog-te-banner-frame') || 
                       document.querySelector('.VIpgJd-Zvi9qb-OR9h33-mlUOnb') ||
                       document.querySelector('iframe.skiptranslate');
        if (topBar) {
          topBar.style.display = 'none';
          topBar.style.visibility = 'hidden';
          document.body.style.top = '0px';
          document.documentElement.style.marginTop = '0px';
        }
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,te,hi,ta,kn,ml,mr,gu,pa,bn,ur,or,as'
          },
          'google_translate_element'
        );
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
